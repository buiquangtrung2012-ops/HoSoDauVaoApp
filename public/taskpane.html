<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Dự Án - Desktop Edition</title>
    <!-- Office.js removed for Desktop App -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>
    <style>
        body {
            font-family: 'Times New Roman', serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .tab-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .tab-btn.active {
            background-color: #1e293b;
            color: #818cf8;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 3px;
            background-color: #6366f1;
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .input-field {
            width: 100%;
            min-height: 2.125rem;
            background-color: #f1f5f9;
            border: 1.5px solid transparent;
            border-radius: 0.75rem;
            padding: 0.35rem 0.85rem;
            font-size: 13px;
            font-family: 'Times New Roman', serif;
            transition: all 0.2s;
            line-height: 1.4;
        }

        .input-field:focus {
            background-color: white;
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 4px 12px -2px rgba(99, 102, 241, 0.15);
        }

        .card {
            background: white;
            border: 1px solid #f1f5f9;
            cursor: pointer;
            transition: all 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            border-color: #e2e8f0;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .btn-modern {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0.45rem 0.75rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
        }

        .btn-modern:active {
            transform: scale(0.95);
        }

        .btn-modern:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary-modern {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
        }

        .btn-primary-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.3);
        }

        .btn-secondary-modern {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #334155;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary-modern:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .progress-striped {
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.25) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.25) 50%, rgba(255, 255, 255, 0.25) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
            animation: progress-stripes 1s linear infinite;
        }

        @keyframes progress-stripes {
            from { background-position: 1rem 0; }
            to { background-position: 0 0; }
        }

        .project-grid-container {
            display: grid;
            gap: 1rem;
            width: 100%;
        }

        @media (max-width: 480px) {
            .project-grid-container {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .field-full-width {
                grid-column: span 2 / span 2;
            }
        }

        @media (min-width: 481px) {
            .project-grid-container {
                grid-template-columns: repeat(1, minmax(0, 1fr));
            }

            .field-full-width {
                grid-column: span 1 / span 1;
            }
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden bg-white">

    <!-- Vertical Navigation Sidebar -->
    <nav
        class="w-16 sm:w-20 bg-slate-900 flex flex-col items-center py-6 gap-6 z-20 shadow-xl border-r border-slate-800">
        <div class="mb-4 text-indigo-400">
            <i data-lucide="layers" size="28"></i>
        </div>

        <div class="flex flex-col gap-2 w-full px-2">
            <button data-tab="duAn"
                class="tab-btn active group flex flex-col items-center gap-1 py-3 px-1 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                <i data-lucide="home" size="20"></i>
                <span class="text-[9px] font-bold uppercase tracking-tight">Dự án</span>
            </button>
            <button data-tab="nhanSu"
                class="tab-btn group flex flex-col items-center gap-1 py-3 px-1 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                <i data-lucide="users" size="20"></i>
                <span class="text-[9px] font-bold uppercase tracking-tight">Nhân sự</span>
            </button>
            <button data-tab="mayMoc"
                class="tab-btn group flex flex-col items-center gap-1 py-3 px-1 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                <i data-lucide="truck" size="20"></i>
                <span class="text-[9px] font-bold uppercase tracking-tight">Máy móc</span>
            </button>
            <button data-tab="vatLieu"
                class="tab-btn group flex flex-col items-center gap-1 py-3 px-1 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                <i data-lucide="package" size="20"></i>
                <span class="text-[9px] font-bold uppercase tracking-tight">Vật liệu</span>
            </button>
            <button data-tab="thiNghiem"
                class="tab-btn group flex flex-col items-center gap-1 py-3 px-1 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                <i data-lucide="microscope" size="20"></i>
                <span class="text-[9px] font-bold uppercase tracking-tight">Phòng TN</span>
            </button>
            <button data-tab="xuatBan"
                class="tab-btn group flex flex-col items-center gap-1 py-3 px-1 rounded-xl transition-all hover:bg-slate-800 text-slate-400">
                <i data-lucide="settings" size="20"></i>
                <span class="text-[9px] font-bold uppercase tracking-tight">Cài đặt</span>
            </button>
        </div>
    </nav>

    <!-- Main Section (Header + Content + Footer) -->
    <div class="flex-1 flex flex-col min-w-0 bg-slate-50 relative">
        <header class="p-4 bg-white border-b border-slate-100 flex items-center justify-between z-10 shadow-sm">
            <div class="flex items-center gap-2">
                <h1 class="text-sm font-black uppercase tracking-tighter text-slate-800">
                    Hồ Sơ Dự Án Desktop</h1>
                <div id="statusInfo"
                    class="text-[10px] font-bold px-2 py-1 bg-slate-100 rounded-full text-slate-500 uppercase tracking-widest">
                    v1.0.0 Desktop</div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-6" id="mainContent">
            <!-- Template Selection Section -->
            <div class="max-w-3xl mx-auto mb-2">
                <div class="p-4 bg-indigo-50 border border-indigo-100 rounded-2xl flex items-center justify-between">
                    <div class="flex-1">
                        <h4 class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Cấu hình mẫu văn bản (.docx)</h4>
                        <div id="templateLabel" class="text-xs text-slate-500">Chưa chọn file mẫu .docx</div>
                    </div>
                    <label class="cursor-pointer bg-white px-4 py-2 rounded-xl text-xs font-bold text-indigo-600 border border-indigo-200 hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                        <i data-lucide="file-up" size="14" class="inline mr-1"></i> CHỌN FILE MẪU
                        <input type="file" id="templateInput" class="hidden" accept=".docx">
                    </label>
                </div>
            </div>

            <div id="tabContent" class="max-w-3xl mx-auto space-y-4">
            </div>
        </main>

        <footer class="bg-white border-t border-slate-100 p-4 shadow-[0_-8px_30px_rgb(0,0,0,0.04)] relative">
            <div class="grid grid-cols-2 gap-3 max-w-sm mx-auto">
                <button id="btnCapNhat"
                    class="btn-modern bg-indigo-600 text-white hover:bg-indigo-700 shadow-indigo-200">
                    <i data-lucide="refresh-cw" size="18"></i> LƯU DỮ LIỆU
                </button>
                <button id="btnSplit" disabled
                    class="btn-modern bg-slate-100 text-slate-400 border border-slate-200 cursor-not-allowed" title="Tính năng này cần Word Add-in hoặc Template">
                    <i data-lucide="split" size="18"></i> TÁCH HỒ SƠ
                </button>
                <button id="btnExport" class="btn-modern bg-slate-800 text-white hover:bg-slate-900 shadow-slate-200">
                    <i data-lucide="file-text" size="18"></i> XUẤT FILE JSON
                </button>
                <button id="btnImportDoc"
                    class="btn-modern bg-emerald-600 text-white hover:bg-emerald-700 shadow-emerald-200">
                    <i data-lucide="cloud-download" size="18"></i> NHẬP DỮ LIỆU
                </button>
            </div>
            <div id="loadingProgressContainer" class="mt-4 w-full flex-col items-center justify-center hidden opacity-0 transition-opacity duration-300">
                <div class="w-full max-w-[200px] bg-slate-200 rounded-full h-3 overflow-hidden relative mx-auto">
                    <div id="loadingProgressBar" class="bg-blue-500 h-full rounded-full transition-all duration-300 ease-out progress-striped" style="width: 0%"></div>
                </div>
                <div id="loadingProgressText" class="text-[10px] font-bold text-blue-500 mt-1 text-center">0%</div>
            </div>
        </footer>
    </div>

    <!-- Modals (Simplified for this example) -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-7 shadow-2xl flex flex-col max-h-[90vh]">
            <h3 id="modalTitle" class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                <i data-lucide="edit-3" class="text-indigo-500"></i>
                Chi tiết bản ghi
            </h3>
            <div id="modalFormContent" class="flex-1 overflow-y-auto custom-scrollbar space-y-4 mb-7"></div>
            <div class="flex gap-3">
                <button id="btnModalCancel" class="flex-1 h-12 bg-slate-100 text-slate-600 font-bold rounded-xl text-sm">Hủy</button>
                <button id="btnModalSave" class="flex-2 h-12 bg-indigo-600 text-white font-bold rounded-xl text-sm">LƯU</button>
            </div>
        </div>
    </div>

    <!-- Script imports -->
    <script type="module" src="taskpane.js"></script>
</body>
</html>
